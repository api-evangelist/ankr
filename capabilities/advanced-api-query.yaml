naftiko: 1.0.0-alpha2
info:
  label: Ankr Advanced API — Query
  description: 'Ankr Advanced API Query methods. Self-contained Naftiko capability covering blockchain statistics, block reads, log filtering, transactions by hash/address, and cross-chain wallet interactions.'
  tags:
  - Ankr
  - Query
  - Web3
  - Multichain
  - Indexer
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ANKR_API_KEY: ANKR_API_KEY
capability:
  consumes:
  - type: http
    namespace: advanced-api-query
    baseUri: https://rpc.ankr.com
    description: Ankr Advanced API Query methods via JSON-RPC.
    resources:
    - name: multichain
      path: /multichain/{{env.ANKR_API_KEY}}
      operations:
      - name: getblockchainstats
        method: POST
        description: Ankr Get Blockchain Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: getblocks
        method: POST
        description: Ankr Get Blocks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: getlogs
        method: POST
        description: Ankr Get Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: gettransactionsbyhash
        method: POST
        description: Ankr Get Transactions By Hash
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: gettransactionsbyaddress
        method: POST
        description: Ankr Get Transactions By Address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: getinteractions
        method: POST
        description: Ankr Get Interactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
  exposes:
  - type: rest
    namespace: advanced-api-query-rest
    port: 8080
    description: REST adapter for Ankr Advanced API Query methods.
    resources:
    - path: /v1/advanced-api/query/stats
      name: query-stats
      operations:
      - method: POST
        name: getblockchainstats
        description: Ankr Get Blockchain Stats
        call: advanced-api-query.getblockchainstats
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/advanced-api/query/blocks
      name: query-blocks
      operations:
      - method: POST
        name: getblocks
        description: Ankr Get Blocks
        call: advanced-api-query.getblocks
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/advanced-api/query/logs
      name: query-logs
      operations:
      - method: POST
        name: getlogs
        description: Ankr Get Logs
        call: advanced-api-query.getlogs
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/advanced-api/query/transactions
      name: query-transactions
      operations:
      - method: POST
        name: gettransactionsbyhash
        description: Ankr Get Transactions By Hash
        call: advanced-api-query.gettransactionsbyhash
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/advanced-api/query/interactions
      name: query-interactions
      operations:
      - method: POST
        name: getinteractions
        description: Ankr Get Interactions
        call: advanced-api-query.getinteractions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: advanced-api-query-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ankr Advanced API Query methods.
    tools:
    - name: ankr-get-blockchain-stats
      description: Ankr Get Blockchain Stats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advanced-api-query.getblockchainstats
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ankr-get-blocks
      description: Ankr Get Blocks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advanced-api-query.getblocks
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ankr-get-logs
      description: Ankr Get Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advanced-api-query.getlogs
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ankr-get-transactions-by-hash
      description: Ankr Get Transactions By Hash
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advanced-api-query.gettransactionsbyhash
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ankr-get-transactions-by-address
      description: Ankr Get Transactions By Address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advanced-api-query.gettransactionsbyaddress
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ankr-get-interactions
      description: Ankr Get Interactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: advanced-api-query.getinteractions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
