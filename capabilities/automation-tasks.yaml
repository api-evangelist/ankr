naftiko: 1.0.0-alpha2
info:
  label: Ankr Contract Automation — Tasks
  description: 'Ankr Contract Automation control-plane: create, list, fetch, and delete on-chain automation tasks for BNB Smart Chain contracts (time and event triggers).'
  tags:
  - Ankr
  - Automation
  - SmartContracts
  - BNB
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ANKR_AUTOMATION_TOKEN: ANKR_AUTOMATION_TOKEN
capability:
  consumes:
  - type: http
    namespace: automation-tasks
    baseUri: https://www.ankr.com
    description: Ankr Automation control-plane REST API.
    resources:
    - name: tasks
      path: /automation/api/v1/tasks
      operations:
      - name: listtasks
        method: GET
        description: Ankr List Automation Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: createtask
        method: POST
        description: Ankr Create Automation Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: task
      path: /automation/api/v1/tasks/{taskId}
      operations:
      - name: gettask
        method: GET
        description: Ankr Get Automation Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
      - name: deletetask
        method: DELETE
        description: Ankr Delete Automation Task
        outputRawFormat: json
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.ANKR_AUTOMATION_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: automation-tasks-rest
    port: 8080
    description: REST adapter for Ankr Contract Automation.
    resources:
    - path: /v1/automation/tasks
      name: automation-tasks
      operations:
      - method: GET
        name: listtasks
        description: Ankr List Automation Tasks
        call: automation-tasks.listtasks
        outputParameters:
        - type: array
          mapping: $.
      - method: POST
        name: createtask
        description: Ankr Create Automation Task
        call: automation-tasks.createtask
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: automation-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ankr Contract Automation.
    tools:
    - name: ankr-list-automation-tasks
      description: Ankr List Automation Tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: automation-tasks.listtasks
      outputParameters:
      - type: array
        mapping: $.
    - name: ankr-create-automation-task
      description: Ankr Create Automation Task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: automation-tasks.createtask
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ankr-delete-automation-task
      description: Ankr Delete Automation Task
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: automation-tasks.deletetask
      with:
        taskId: tools.taskId
      outputParameters:
      - type: object
        mapping: $.
